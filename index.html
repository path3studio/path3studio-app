<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Path3 Studio — Ordena tu Logo</title>
  <meta name="description" content="Logo único con archivos para imprenta y redes. Pago seguro." />
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 + Babel UMD (para usar JSX en un solo archivo) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-zinc-50 text-zinc-900">
  <div id="root"></div>

  <script type="text/babel">
  const { useMemo, useState } = React;

  /* ================= CONFIG ================= */
  const BRAND_NAME = "Path3 Studio";
  const LOGO_SRC   = "/Icono%203.png";           // opcional
  const EMAIL_RECEIVE = "path3studio@gmail.com";
  const PAYPAL_USERNAME = "ernestofranciscoguajardopatiño"; // si falla, usa sin acentos

  // ✅ Tu edge function (Stripe)
  const STRIPE_CHECKOUT_ENDPOINT = "https://checkout.path3studio.app/api/checkout";

  // ✅ Tu Apps Script (Google Sheets)
  const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycby-CSbzk9Ta38C4MT-WCd156PQeZ-sNPX_jtbBiEDlq_e2Ho9zpbogZt07nd__RkxR4eg/exec";

  // (Opcional) EmailJS: si más adelante quieres activar el correo automático,
  // rellena estos tres valores y descomenta el bloque marcado como // EMAILJS.
  const EMAILJS_SERVICE_ID = "";
  const EMAILJS_TEMPLATE_ID = "";
  const EMAILJS_PUBLIC_KEY  = "";

  /* =============== CATÁLOGO (lite) =============== */
  const PACKAGES = [
    { id:"esencial", name:"Logo Esencial", price:1490, listPrice:1990, delivery:"3–5 días", bullets:["PNG y JPG (3000px)","PDF para impresión","Versión Black"] },
    { id:"premium",  name:"Logo Premium",  price:2490, listPrice:2990, delivery:"3–7 días", bullets:["Todo lo anterior +","Versión White","Imagen para redes","Portadas FB/WA"], best:true },
    { id:"pro",      name:"Logo Pro",      price:3890, listPrice:4690, delivery:"5–10 días", bullets:["Esencial + Premium +","Logotipo secundario","Guía color/tipos","GIF/Intro 10–15s","Editables (PSD/AI)"] },
  ];
  const ADDONS = [
    { id:"express", name:"Entrega Express 72 h", price:690 },
    { id:"ronda_extra", name:"Ronda de cambios extra", price:290 },
    { id:"tarjeta", name:"Tarjeta de presentación", price:700 },
    { id:"firma",   name:"Firma de correo", price:700 },
  ];
  const PROMOS = { CAMINO15:0.15, RUTA10:0.10 };
  const NL = "\n";

  /* =============== HELPERS =============== */
  const mxn = (n)=> n.toLocaleString("es-MX",{style:"currency",currency:"MXN"});
  const isEmail = (s)=>/.+@.+\..+/.test(s);
  const paypalUrl = (amount)=>`https://paypal.me/${encodeURIComponent(PAYPAL_USERNAME)}/${(Math.round(amount*100)/100).toFixed(2)}`;

  function computePricing(selectedPkg, addons, code=""){
    const base = selectedPkg?.price || 0;
    let add = addons.reduce((acc,id)=>acc + (ADDONS.find(a=>a.id===id)?.price||0), 0);
    const subtotal = base + add;
    let lines = [];
    // pack descuento tarjeta+firma
    if (addons.includes("tarjeta") && addons.includes("firma")) {
      lines.push({label:"Descuento pack tarjeta + firma", amount:-500});
    }
    const promo = (code||"").trim().toUpperCase();
    if (promo && PROMOS[promo]) {
      lines.push({label:`Descuento promocional (${promo} – ${Math.round(PROMOS[promo]*100)}%)`, amount: -Math.round(subtotal*PROMOS[promo])});
    }
    const total = Math.max(0, subtotal + lines.reduce((a,b)=>a+b.amount,0));
    return { subtotal, total, lines };
  }

  /* =============== APP =============== */
  function App(){
    const [step,setStep] = useState(1);
    const [selected,setSelected] = useState(PACKAGES[1]);
    const [addons,setAddons] = useState([]);
    const [promo,setPromo] = useState("");
    const [agree,setAgree] = useState(false);
    const [sending,setSending] = useState(false);

    const [clientName,setClientName] = useState("");
    const [clientEmail,setClientEmail] = useState("");
    const [logoText,setLogoText] = useState("");
    const [sector,setSector] = useState("");

    const price = useMemo(()=>computePricing(selected,addons,promo),[selected,addons,promo]);
    const toggleAddon = (id)=> setAddons(a=> a.includes(id) ? a.filter(x=>x!==id) : [...a,id]);

    async function sendToSheet(payload){
      if (!SHEET_WEBHOOK_URL) return;
      await fetch(SHEET_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify(payload),
      });
    }

    async function sendEmail(payload){
      // EMAILJS (opcional). Si rellenas los 3 IDs arriba, descomenta este bloque:
      /*
      if (EMAILJS_SERVICE_ID && EMAILJS_TEMPLATE_ID && EMAILJS_PUBLIC_KEY){
        const mod = await import("https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js");
        mod.emailjs.init(EMAILJS_PUBLIC_KEY);
        await mod.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          to_email: EMAIL_RECEIVE,
          client_email: clientEmail,
          payload_json: JSON.stringify(payload,null,2),
        });
      }
      */
    }

    async function prepareOrder(provider){
      if (!logoText.trim()){ alert("Escribe el texto que debe decir tu logo."); return; }
      if (!isEmail(clientEmail)){ alert("Ingresa un correo válido."); return; }
      if (!clientName.trim()){ alert("Ingresa tu nombre."); return; }
      if (!agree){ alert("Debes aceptar Términos y Políticas."); return; }

      setSending(true);
      try{
        const orderId = "LGR-"+String(Math.floor(Math.random()*100000)).padStart(5,"0");
        const payload = {
          orderId, date:new Date().toISOString(),
          package: selected.id, package_name: selected.name,
          addons, subtotal: price.subtotal, discounts: price.lines, total: price.total,
          client:{ name:clientName, email:clientEmail },
          brief:{ logo:logoText, sector },
        };

        // guarda en Sheet (y opcional EmailJS)
        await Promise.allSettled([ sendToSheet(payload), sendEmail(payload) ]);

        if (provider === "paypal"){
          const url = paypalUrl(price.total);
          window.open(url, "_blank") || (window.location.href = url);
        } else {
          if (!STRIPE_CHECKOUT_ENDPOINT) { alert("Configura STRIPE_CHECKOUT_ENDPOINT."); return; }
          const r = await fetch(STRIPE_CHECKOUT_ENDPOINT, {
            method:"POST", headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ orderId, total: price.total })
          });
          const data = await r.json().catch(()=> ({}));
          if (!r.ok) throw new Error(data?.error || "No se pudo crear el checkout");
          if (data?.url) window.location.href = data.url;
          else throw new Error("Respuesta inesperada del servidor de pagos.");
        }
      } catch(e){
        console.error(e);
        alert("No se pudo continuar: " + (e?.message || e));
      } finally{
        setSending(false);
      }
    }

    return (
      <div className="min-h-screen">
        <header className="sticky top-0 bg-white/80 backdrop-blur border-b border-zinc-200">
          <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <img src={LOGO_SRC} alt="" className="w-9 h-9 object-contain" onError={e=>e.currentTarget.remove()}/>
              <div className="leading-tight">
                <p className="font-semibold">{BRAND_NAME}</p>
                <p className="text-xs text-zinc-500">Orden de logo · Pago seguro</p>
              </div>
            </div>
            <button onClick={()=>setStep(1)} className="px-3 py-1.5 rounded-xl bg-red-600 text-white text-sm hover:bg-red-700">Ordenar ahora</button>
          </div>
        </header>

        <main className="max-w-5xl mx-auto px-4 py-8 grid md:grid-cols-5 gap-6">
          <section className="md:col-span-3">
            {step===1 && (
              <div>
                <h2 className="text-xl font-semibold mb-2">Elige tu paquete</h2>
                <div className="grid sm:grid-cols-2 gap-4">
                  {PACKAGES.map(p=>(
                    <button key={p.id} onClick={()=>setSelected(p)}
                      className={`text-left rounded-2xl border p-4 bg-white hover:shadow ${selected.id===p.id? "border-black ring-1 ring-red-500/30":"border-zinc-200"}`}>
                      <div className="flex items-center justify-between">
                        <h3 className="font-semibold">{p.name}</h3>
                        {p.best && <span className="text-xs bg-red-600 text-white rounded px-2 py-0.5">Recomendado</span>}
                      </div>
                      <div className="flex items-baseline gap-2 my-1">
                        <span className="text-zinc-400 line-through">{mxn(p.listPrice)}</span>
                        <span className="text-2xl font-bold">{mxn(p.price)}</span>
                      </div>
                      <div className="text-xs text-zinc-500 mb-2">{p.delivery}</div>
                      <ul className="text-sm space-y-1 list-disc pl-4">
                        {p.bullets.map((b,i)=><li key={i}>{b}</li>)}
                      </ul>
                    </button>
                  ))}
                </div>
                <div className="mt-4 flex justify-end">
                  <button className="px-4 py-2 rounded-xl bg-black text-white hover:bg-red-600" onClick={()=>setStep(2)}>Continuar</button>
                </div>
              </div>
            )}

            {step===2 && (
              <div>
                <h2 className="text-xl font-semibold mb-3">Detalles del pedido</h2>
                <div className="grid gap-3">
                  <div>
                    <label className="font-medium">¿Qué debe decir tu logo? *</label>
                    <input className="w-full border rounded-xl px-3 py-2 border-zinc-300 focus:outline-none focus:ring-2 focus:ring-red-500/30"
                           placeholder="Ej. Path3 Studio" value={logoText} onChange={e=>setLogoText(e.target.value)} />
                  </div>
                  <div>
                    <label className="font-medium">Sector</label>
                    <input className="w-full border rounded-xl px-3 py-2 border-zinc-300 focus:outline-none focus:ring-2 focus:ring-red-500/30"
                           placeholder="Ej. Gastronomía, Abogados, eCommerce…" value={sector} onChange={e=>setSector(e.target.value)} />
                  </div>
                  <div className="grid sm:grid-cols-2 gap-3">
                    <div>
                      <label className="font-medium">Tu nombre *</label>
                      <input className="w-full border rounded-xl px-3 py-2 border-zinc-300 focus:outline-none focus:ring-2 focus:ring-red-500/30"
                             value={clientName} onChange={e=>setClientName(e.target.value)} placeholder="Ej. Ana Rivera" />
                    </div>
                    <div>
                      <label className="font-medium">Tu correo *</label>
                      <input type="email" className="w-full border rounded-xl px-3 py-2 border-zinc-300 focus:outline-none focus:ring-2 focus:ring-red-500/30"
                             value={clientEmail} onChange={e=>setClientEmail(e.target.value)} placeholder="ana@email.com" />
                    </div>
                  </div>
                  <div className="mt-4 flex justify-between">
                    <button className="px-4 py-2 rounded-xl border border-zinc-300" onClick={()=>setStep(1)}>Volver</button>
                    <button className="px-4 py-2 rounded-xl bg-black text-white hover:bg-red-600" onClick={()=>setStep(3)}>Continuar</button>
                  </div>
                </div>
              </div>
            )}

            {step===3 && (
              <div>
                <h2 className="text-xl font-semibold mb-3">Adicionales</h2>
                <div className="grid sm:grid-cols-2 gap-3">
                  {ADDONS.map(a=>(
                    <label key={a.id} className={`rounded-xl border p-3 bg-white ${addons.includes(a.id)?"border-black ring-1 ring-red-500/20":"border-zinc-200"}`}>
                      <div className="flex items-center justify-between">
                        <div>
                          <p className="font-medium">{a.name}</p>
                          <p className="text-xs text-zinc-600">{mxn(a.price)}</p>
                        </div>
                        <input type="checkbox" className="w-5 h-5" checked={addons.includes(a.id)} onChange={()=>toggleAddon(a.id)} />
                      </div>
                    </label>
                  ))}
                </div>
                <div className="mt-4 flex justify-between">
                  <button className="px-4 py-2 rounded-xl border border-zinc-300" onClick={()=>setStep(2)}>Volver</button>
                  <button className="px-4 py-2 rounded-xl bg-black text-white hover:bg-red-600" onClick={()=>setStep(4)}>Continuar</button>
                </div>
              </div>
            )}
          </section>

          <aside className="md:col-span-2">
            <div className="rounded-2xl border border-zinc-200 bg-white p-5 sticky top-20">
              <h3 className="text-xl font-semibold mb-4">Tu pedido</h3>
              <div className="space-y-3 text-sm">
                <div className="flex items-center justify-between"><span>{selected.name}</span><span className="font-medium">{mxn(selected.price)}</span></div>
                {addons.map(id=>{
                  const a=ADDONS.find(x=>x.id===id);
                  return <div key={id} className="flex items-center justify-between text-zinc-600"><span>• {a.name}</span><span>{mxn(a.price)}</span></div>
                })}
                {price.lines.map((d,i)=>(
                  <div key={i} className="flex items-center justify-between text-emerald-700">
                    <span>{d.label}</span><span>{mxn(d.amount)}</span>
                  </div>
                ))}
                <div className="border-t pt-3 flex items-center justify-between text-base">
                  <span className="font-semibold">Total</span>
                  <span className="font-bold text-red-700">{mxn(price.total)}</span>
                </div>
              </div>

              {step===4 ? (
                <div className="mt-5 space-y-3">
                  <div className="grid grid-cols-[1fr_auto] gap-2 items-center">
                    <div>
                      <label className="text-xs text-zinc-600">Código de descuento</label>
                      <input className="w-full border border-zinc-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500/30"
                             placeholder="Código (opcional)" value={promo} onChange={e=>setPromo(e.target.value)} />
                    </div>
                    <div className="text-[11px] text-zinc-500">Aplica si tienes código</div>
                  </div>
                  <label className="text-sm flex gap-2 items-start">
                    <input type="checkbox" checked={agree} onChange={e=>setAgree(e.target.checked)} />
                    <span>Acepto Términos y Políticas.</span>
                  </label>
                  <button disabled={sending||!agree}
                          onClick={()=>prepareOrder("paypal")}
                          className={`w-full rounded-xl bg-[#003087] text-white font-semibold py-3 ${!agree?"opacity-60 cursor-not-allowed":"hover:brightness-110"}`}>
                    {sending?"Preparando…":"Pagar ahora con PayPal"}
                  </button>
                  <button disabled={sending||!agree}
                          onClick={()=>prepareOrder("stripe")}
                          className={`w-full rounded-xl border border-zinc-300 bg-white font-medium py-2 ${!agree?"opacity-60 cursor-not-allowed":"hover:brightness-110"}`}>
                    {sending?"Preparando…":"Pagar con tarjeta (Stripe)"}
                  </button>
                  <p className="text-xs text-zinc-500">
                    Recibirás confirmación por correo. Soporte: <a className="underline" href={"mailto:"+EMAIL_RECEIVE}>{EMAIL_RECEIVE}</a>.
                  </p>
                </div>
              ) : (
                <div className="mt-5 flex justify-end">
                  <button className="px-4 py-2 rounded-xl bg-black text-white hover:bg-red-600"
                          onClick={()=> setStep(step<4? step+1 : 4)}>Continuar</button>
                </div>
              )}
            </div>
          </aside>
        </main>

        <footer className="max-w-5xl mx-auto px-4 pb-10 text-xs text-zinc-500">
          <div className="border-t border-zinc-200 pt-6 flex items-center justify-between">
            <p>© {new Date().getFullYear()} {BRAND_NAME} · Archivos listos para impresión y redes.</p>
            <div className="flex gap-4">
              <a className="underline" href="mailto:path3studio@gmail.com">Contacto</a>
            </div>
          </div>
        </footer>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
